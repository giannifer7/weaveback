name: Docs → GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build & deploy docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      # Rust build cache — cuts rebuild time on subsequent runs
      - uses: Swatinem/rust-cache@v2
        with:
          key: docgen

      - name: Install asciidoctor + gems
        run: |
          sudo gem install asciidoctor asciidoctor-diagram rouge --no-document

      - name: Install PlantUML
        run: |
          sudo apt-get install -y default-jre graphviz
          mkdir -p /opt/plantuml
          curl -L https://github.com/plantuml/plantuml/releases/latest/download/plantuml.jar \
               -o /opt/plantuml/plantuml.jar
          printf '#!/bin/sh\nexec java -jar /opt/plantuml/plantuml.jar "$@"\n' \
            | sudo tee /usr/local/bin/plantuml > /dev/null
          sudo chmod +x /usr/local/bin/plantuml
          plantuml -version

      - name: Build weaveback-docgen
        run: cargo build --release --package weaveback-docgen

      - name: Generate docs
        run: cargo run --release --package weaveback-docgen

      - name: Create root index
        run: cp docs/html/README.html docs/html/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs/html

      - id: deploy
        uses: actions/deploy-pages@v4
