name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create GitHub release
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-containers:
    name: Release (${{ matrix.target }})
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [ glibc, musl, windows, fedora ]

    steps:
      - uses: actions/checkout@v6

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build container
        run: podman build --target ${{ matrix.target }} -t azadi-${{ matrix.target }} .

      - name: Export artifacts
        run: |
          mkdir -p dist/${{ matrix.target }}
          podman create --name azadi-export azadi-${{ matrix.target }}
          podman cp azadi-export:/out/. dist/${{ matrix.target }}/
          podman rm azadi-export

      - name: Upload release assets
        run: gh release upload "${{ github.ref_name }}" dist/${{ matrix.target }}/* --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-windows-native:
    name: Release (windows-native)
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --workspace

      - name: Collect artifacts
        run: |
          mkdir dist\windows-native
          copy target\release\azadi.exe        dist\windows-native\
          copy target\release\azadi-macros.exe dist\windows-native\
          copy target\release\azadi-noweb.exe  dist\windows-native\

      - name: Upload release assets
        run: gh release upload "${{ github.ref_name }}" dist/windows-native/* --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
