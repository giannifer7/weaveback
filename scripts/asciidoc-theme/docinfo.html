<meta name="color-scheme" content="dark">
<style>
/* ── Gruvbox Dark Hard ────────────────────────────────────────── */
:root {
  color-scheme: dark;
  --bg:     #1d2021;
  --bg1:    #282828;
  --bg2:    #3c3836;
  --bg3:    #504945;
  --fg:     #ebdbb2;
  --fg2:    #d5c4a1;
  --gray:   #928374;
  --red:    #fb4934;
  --green:  #b8bb26;
  --yellow: #fabd2f;
  --blue:   #83a598;
  --purple: #d3869b;
  --aqua:   #8ec07c;
  --orange: #fe8019;
}

/* ── Nuke black text from the inline default stylesheet ───────── */
html, body,
blockquote, blockquote p,
pre, code, kbd,
p, li, dt, dd, ol, ul,
table tr th, table tr td,
table thead tr th, table thead tr td,
table tfoot tr th, table tfoot tr td,
tbody tr th, tbody tr th p, tfoot tr th, tfoot tr th p,
#header > h1:first-child,
#header .details, #header .details span.email a,
#content > h1:first-child:not([class]),
#footer, #footer-text,
.admonitionblock > table td.content,
.literalblock.output pre,
.quoteblock blockquote, .quoteblock p,
.quoteblock blockquote::before,
.verseblock pre,
.quoteblock .attribution cite, .verseblock .attribution cite,
.conum[data-value],
.paragraph, .sect1, .sectionbody,
.admonitionblock > table td.content > .paragraph > p {
  color: var(--fg) !important;
}

/* ── Base ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }

html, body {
  background: var(--bg) !important;
  font-family: "Noto Serif", Georgia, serif;
  font-size: 16px;
  line-height: 1.65;
  margin: 0 !important;
  padding: 0 !important;
  max-width: none !important;
}

/* ── Full-width layout ────────────────────────────────────────── */
#header, #content, #footnotes, #footer {
  max-width: none !important;
  width: 100% !important;
  padding-left: 2.5rem !important;
  padding-right: 2.5rem !important;
  margin: 0 !important;
}

#header  { padding-top: 1.5rem !important; padding-bottom: 1rem !important;
           border-bottom: 2px solid var(--bg2) !important;
           background: var(--bg) !important; }
#content { padding-top: 1.5rem !important; background: var(--bg) !important; }
#footer  { padding-top: 0.75rem !important; padding-bottom: 1rem !important;
           border-top: 1px solid var(--bg2) !important;
           color: var(--gray) !important; background: var(--bg) !important; }

/* ── Links ────────────────────────────────────────────────────── */
a           { color: var(--blue) !important; text-decoration: none; }
a:hover     { color: var(--aqua) !important; text-decoration: underline; }
a:visited   { color: var(--purple) !important; }

/* ── Headings ─────────────────────────────────────────────────── */
h1, h2, h3, h4, h5, h6,
#header h1, #content > h1:first-child:not([class]) {
  color: var(--yellow) !important;
  border-bottom-color: var(--bg2) !important;
}
h2, h3 { border-bottom: 1px solid var(--bg2) !important;
          padding-bottom: .2em; margin-top: 1.8em; }
#header .details { color: var(--gray) !important; font-size: .9em; }

/* ── TOC (inline / top) ───────────────────────────────────────── */
#toc      { background: var(--bg1) !important; border: 1px solid var(--bg2) !important;
            border-radius: 4px; padding: 1rem; display: inline-block;
            min-width: 260px; margin-bottom: 1.5rem; }
#toctitle { color: var(--orange) !important; font-weight: bold; margin-bottom: .5rem; }
#toc a    { color: var(--blue) !important; }
#toc ul   { margin: 0; padding-left: 1.2rem; }
#toc li   { margin: .15rem 0; }

/* ── TOC left panel (toc2 / :toc: left) ──────────────────────── */
#toc.toc2 {
  width: 14em !important;
  position: fixed !important;
  left: 0 !important; top: 0 !important; bottom: 0 !important;
  overflow-y: auto !important;
  border-radius: 0 !important;
  border: none !important;
  border-right: 1px solid var(--bg2) !important;
  display: block !important;
  min-width: 0 !important;
  transition: left .2s ease;
}
/* body.toc2 has higher specificity than body so this wins over padding:0 */
body.toc2 { padding-left: 14em !important; transition: padding-left .2s ease; }

/* collapsed state */
body.toc2.toc-collapsed #toc.toc2 { left: -14em !important; }
body.toc2.toc-collapsed            { padding-left: 0 !important; }

/* toggle button — lives inside #toc.toc2, top-right corner */
#toc-toggle {
  display: none;
  position: absolute;
  top: 0; right: 0;
  z-index: 1002;
  background: var(--bg2); color: var(--fg);
  border: none;
  border-left: 1px solid var(--bg3);
  border-bottom: 1px solid var(--bg3);
  border-radius: 0 0 0 4px;
  padding: .25rem .5rem;
  cursor: pointer; font-size: .75em; line-height: 1;
}
body.toc2 #toc-toggle { display: block; }
/* when collapsed the TOC is off-screen — re-anchor button to viewport */
body.toc2.toc-collapsed #toc-toggle {
  position: fixed;
  top: 0; left: 0; right: auto;
  border: none;
  border-right: 1px solid var(--bg3);
  border-bottom: 1px solid var(--bg3);
  border-radius: 0 0 4px 0;
}

/* ── Inline code ──────────────────────────────────────────────── */
code, kbd {
  background: var(--bg) !important;
  color: var(--green) !important;
  border: none !important;
  padding: 0 !important;
  font-size: .88em;
}

/* ── Listing / literal blocks ─────────────────────────────────── */
.listingblock > .content,
.literalblock > .content { padding: 0 !important; }

.listingblock pre,
.literalblock pre {
  background: var(--bg1) !important;
  border: 1px solid var(--bg2) !important;
  border-left: 3px solid var(--bg3) !important;
  border-radius: 4px !important;
  padding: .9em 1.1em !important;
  overflow-x: auto;
  margin: 0 !important;
  color: var(--fg) !important;
}

.listingblock pre code,
.literalblock pre code {
  background: transparent !important;
  color: var(--fg) !important;
  border: none !important;
  padding: 0 !important;
  font-size: .88em;
  line-height: 1.5;
}

.listingblock .title,
.imageblock .title { color: var(--gray) !important; font-style: italic; font-size: .9em; }

/* ── Admonitions ──────────────────────────────────────────────── */
.admonitionblock > table {
  background: var(--bg1) !important; border: 1px solid var(--bg2) !important;
  border-radius: 4px; border-left: 4px solid var(--bg3) !important;
  width: 100%; margin: 1rem 0;
}
.admonitionblock.note      > table { border-left-color: var(--blue) !important; }
.admonitionblock.tip       > table { border-left-color: var(--green) !important; }
.admonitionblock.warning   > table { border-left-color: var(--yellow) !important; }
.admonitionblock.caution   > table { border-left-color: var(--orange) !important; }
.admonitionblock.important > table { border-left-color: var(--red) !important; }
.admonitionblock td.icon   { padding: .75rem 1rem !important; background: var(--bg1) !important; }
.admonitionblock td.icon .title { font-weight: bold; color: var(--fg) !important;
                                   text-transform: uppercase; font-size: .85em; }

/* ── Tables ───────────────────────────────────────────────────── */
table.tableblock               { border-collapse: collapse; width: 100%; margin: 1rem 0; }
table.tableblock th            { background: var(--bg2) !important; color: var(--yellow) !important;
                                  padding: .5rem .75rem; border: 1px solid var(--bg3) !important; }
table.tableblock td            { padding: .5rem .75rem; border: 1px solid var(--bg2) !important;
                                  color: var(--fg) !important; background: var(--bg) !important; }
table.tableblock tbody tr:nth-child(even) td { background: var(--bg1) !important; }

/* ── Sidebar / quote ──────────────────────────────────────────── */
.sidebarblock          { background: var(--bg1) !important; border: 1px solid var(--bg3) !important;
                         border-radius: 4px; padding: 1rem; margin: 1rem 0; }
.quoteblock blockquote { border-left: 3px solid var(--bg3) !important;
                          padding-left: 1rem; color: var(--fg2) !important; }
.attribution           { color: var(--gray) !important; font-style: italic; }

/* ── Misc ─────────────────────────────────────────────────────── */
hr { border: none !important; border-top: 1px solid var(--bg2) !important; margin: 1.5rem 0; }

/* ── Scrollbars ───────────────────────────────────────────────── */
::-webkit-scrollbar       { background: var(--bg1); width: 7px; height: 7px; }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }

/* ── Edit source button (weaveback serve) ─────────────────────── */
#wb-edit-btn {
  position: fixed;
  bottom: 1.2rem;
  right: 1.2rem;
  background: var(--bg2);
  color: var(--fg2);
  border: 1px solid var(--bg3);
  border-radius: 4px;
  padding: .35rem .75rem;
  font-size: .8rem;
  cursor: pointer;
  z-index: 9000;
  text-decoration: none;
  transition: background .15s, color .15s;
}
#wb-edit-btn:hover { background: var(--bg3); color: var(--fg); }

/* ── Chunk inline editor (weaveback serve /__apply) ──────────── */
/* ── AI assistant panel (weaveback serve /__ai) ──────────────── */
.listingblock { position: relative; }

.wb-chunk-btn {
  position: absolute;
  top: .35rem;
  right: .35rem;
  display: none;
  background: var(--bg2);
  color: var(--aqua);
  border: 1px solid var(--bg3);
  border-radius: 3px;
  padding: .1rem .4rem;
  font-size: .75rem;
  cursor: pointer;
  z-index: 100;
  line-height: 1.4;
  transition: background .1s, color .1s;
}
.listingblock:hover .wb-chunk-btn { display: block; }
.wb-chunk-btn:hover { background: var(--bg3); color: var(--fg); }

#wb-editor-panel {
  position: fixed;
  bottom: 0; right: 0;
  width: min(640px, 100vw);
  max-height: 70vh;
  background: var(--bg1);
  border: 1px solid var(--bg3);
  border-bottom: none;
  border-radius: 6px 6px 0 0;
  display: flex;
  flex-direction: column;
  z-index: 9999;

#wb-editor-header {

.wb-editor-btn {

/* ── AI chunk hover button ────────────────────────────────────── */
.wb-ai-btn {
  position: absolute;
  top: .35rem;
  right: 4rem; /* left of the edit button */

/* ── AI assistant panel ───────────────────────────────────────── */

</style>
<script>
/* ── weaveback serve: edit button + live reload ───────────────── */
(function () {
  // Edit source button — only active when served by `weaveback serve`
  document.addEventListener('DOMContentLoaded', function () {
    var path = window.location.pathname
      .replace(/\.html$/, '.adoc')
      .replace(/^\//, '');
    if (!path || window.location.protocol === 'file:') return;

    var btn = document.createElement('a');
    btn.id = 'wb-edit-btn';
    btn.href = '#';
    btn.textContent = '\u270f Edit source';
    btn.title = path;
    btn.addEventListener('click', function (e) {
      e.preventDefault();
      fetch('/__open?file=' + encodeURIComponent(path) + '&line=1');
    });
    document.body.appendChild(btn);
  });

  // SSE live reload — reconnects automatically on disconnect
  if (typeof EventSource !== 'undefined' && window.location.protocol !== 'file:') {
    (function connect() {
      var es = new EventSource('/__events');
      es.addEventListener('reload', function () { location.reload(); });
      es.onerror = function () {
        es.close();
        setTimeout(connect, 2000);
      };
    })();
  }
})();
</script>
<script>
(function () {
  document.addEventListener('DOMContentLoaded', function () {
    if (!document.querySelector('#toc.toc2')) return;

    var btn = document.createElement('button');
    btn.id = 'toc-toggle';
    btn.setAttribute('aria-label', 'Toggle table of contents');
    document.querySelector('#toc.toc2').appendChild(btn);

    var collapsed = localStorage.getItem('weaveback-toc-collapsed') === '1';

    function apply() {
      if (collapsed) {
        document.body.classList.add('toc-collapsed');
        btn.textContent = '▶';
      } else {
        document.body.classList.remove('toc-collapsed');
        btn.textContent = '◀';
      }
    }

    apply();

    btn.addEventListener('click', function () {
      collapsed = !collapsed;
      localStorage.setItem('weaveback-toc-collapsed', collapsed ? '1' : '0');
      apply();
    });
  });
})();
</script>

<script>
(function () {
  document.addEventListener('DOMContentLoaded', function () {
    var xref = window.__xref;
    if (!xref) return;
    var hasImports    = xref.imports    && xref.imports.length > 0;
    var hasImportedBy = xref.importedBy && xref.importedBy.length > 0;
    var hasSymbols    = xref.symbols    && xref.symbols.length > 0;
    if (!hasImports && !hasImportedBy && !hasSymbols) return;

    // Compute relative URL prefix: from the current page back to docs/html/ root.
    function relPathTo(targetHtml) {
      var selfHtml = xref['self'] || '';
      var selfParts = selfHtml.split('/');
      selfParts.pop(); // remove filename
      var toParts = targetHtml.split('/');
      var i = 0;
      while (i < selfParts.length && i < toParts.length && selfParts[i] === toParts[i]) i++;
      var ups = selfParts.slice(i).map(function () { return '..'; });
      return ups.concat(toParts.slice(i)).join('/');
    }

    function linkList(links) {
      var ul = document.createElement('ul');
      links.forEach(function (l) {
        var li = document.createElement('li');
        var a  = document.createElement('a');
        a.href        = relPathTo(l.html);
        a.textContent = l.label;
        a.title       = l.key;
        li.appendChild(a);
        ul.appendChild(li);
      });
      return ul;
    }

    function section(title, content) {
      var div = document.createElement('div');
      div.className = 'xref-section';
      var h3 = document.createElement('h3');
      h3.textContent = title;
      div.appendChild(h3);
      div.appendChild(content);
      return div;
    }

    var panel = document.createElement('div');
    panel.id = 'xref-panel';
    var h2 = document.createElement('h2');
    h2.textContent = 'Module cross-references';
    panel.appendChild(h2);

    if (hasImports) {
      panel.appendChild(section('Imports', linkList(xref.imports)));
    }
    if (hasImportedBy) {
      panel.appendChild(section('Imported by', linkList(xref.importedBy)));
    }
    if (hasSymbols) {
      var sym = document.createElement('div');
      sym.className = 'xref-symbols';
      sym.textContent = xref.symbols.join('  ·  ');
      panel.appendChild(section('Public symbols', sym));
    }

    var content = document.getElementById('content');
    if (content) content.appendChild(panel);
  });
})();
</script>
<script>
/* ── weaveback serve: chunk inline editor ─────────────────────── */
(function () {
  if (window.location.protocol === 'file:') return;

  /* ── Build the editor panel DOM ──────────────────────────────── */
  var panel = document.createElement('div');
  panel.id = 'wb-editor-panel';
  panel.className = 'hidden';
  panel.innerHTML =
    '<div id="wb-editor-header">' +
      '<span id="wb-editor-title"></span>' +
      '<button id="wb-editor-close" title="Close">\u00d7</button>' +
    '</div>' +
    '<textarea id="wb-editor-textarea" spellcheck="false"></textarea>' +
    '<div id="wb-editor-footer">' +
      '<button class="wb-editor-btn primary" id="wb-editor-save">Save</button>' +
      '<button class="wb-editor-btn" id="wb-editor-cancel">Cancel</button>' +
      '<span id="wb-editor-status"></span>' +
    '</div>';
  document.body.appendChild(panel);

  var titleEl  = document.getElementById('wb-editor-title');
  var textarea = document.getElementById('wb-editor-textarea');
  var statusEl = document.getElementById('wb-editor-status');

  var currentFile = '', currentName = '', currentNth = 0, originalBody = '';

  function openPanel(file, name, nth) {
    currentFile = file; currentName = name; currentNth = nth;
    titleEl.textContent = name + '  \u2014  ' + file;
    titleEl.title = file + ' | ' + name + ' | nth=' + nth;
    textarea.value = '';
    statusEl.textContent = 'Loading\u2026';
    statusEl.className = '';
    panel.classList.remove('hidden');
    textarea.focus();

    fetch('/__chunk?file=' + encodeURIComponent(file) +
          '&name=' + encodeURIComponent(name) +
          '&nth=' + nth)
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (!data.ok) {
          statusEl.textContent = data.error || 'error';
          statusEl.className = 'error';
          return;
        }
        textarea.value = data.body;
        originalBody = data.body;
        statusEl.textContent = '';
      })
      .catch(function (e) {
        statusEl.textContent = String(e);
        statusEl.className = 'error';
      });
  }

  function closePanel() {
    panel.classList.add('hidden');
    statusEl.textContent = '';
    statusEl.className = '';
    originalBody = '';
  }

  document.getElementById('wb-editor-close').addEventListener('click', closePanel);
  document.getElementById('wb-editor-cancel').addEventListener('click', closePanel);

  document.getElementById('wb-editor-save').addEventListener('click', function () {
    statusEl.textContent = 'Saving\u2026';
    statusEl.className = '';
    fetch('/__apply', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        file:     currentFile,
        name:     currentName,
        nth:      currentNth,
        old_body: originalBody,
        new_body: textarea.value,
      }),
    })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (!data.ok) {
          statusEl.textContent = data.error || 'error';
          statusEl.className = 'error';
          return;
        }
        statusEl.textContent = 'Saved \u2014 waiting for rebuild\u2026';
        statusEl.className = 'ok';
        originalBody = textarea.value;
        // SSE will reload the page when the HTML is regenerated.
      })
      .catch(function (e) {
        statusEl.textContent = String(e);
        statusEl.className = 'error';
      });
  });

  /* Ctrl+S / Cmd+S saves from inside the textarea */
  textarea.addEventListener('keydown', function (e) {
    if (e.key === 's' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      document.getElementById('wb-editor-save').click();
    }
    if (e.key === 'Escape') { closePanel(); }
  });

  /* ── Attach edit + AI buttons to annotated listingblocks ───── */
  document.addEventListener('DOMContentLoaded', function () {
    var blocks = document.querySelectorAll('.listingblock[data-chunk-id]');
    blocks.forEach(function (block) {
      var id    = block.getAttribute('data-chunk-id');
      var parts = id.split('|');
      if (parts.length < 3) return;
      var file = parts[0], name = parts[1], nth = parseInt(parts[2], 10);

      var editBtn = document.createElement('button');
      editBtn.className = 'wb-chunk-btn';
      editBtn.textContent = '\u270e Edit';
      editBtn.title = 'Edit chunk \u201c' + name + '\u201d';
      editBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        openPanel(file, name, nth);
      });
      block.appendChild(editBtn);

      var aiBtn = document.createElement('button');
      aiBtn.className = 'wb-ai-btn';
      aiBtn.textContent = '\u2736 Ask';
      aiBtn.title = 'Ask AI about chunk \u201c' + name + '\u201d';
      aiBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        openAiPanel(file, name, nth);
      });
      block.appendChild(aiBtn);
    });
  });
})();
</script>
<script>
/* ── weaveback serve: AI assistant panel ──────────────────────── */
(function () {
  if (window.location.protocol === 'file:') return;

  /* ── Parse SSE buffer into complete events ─────────────────── */
  function parseSseBuf(buf) {
    var events = [], remaining = buf;
    while (true) {
      var idx = remaining.indexOf('\n\n');
      if (idx === -1) break;
      var block = remaining.slice(0, idx);
      remaining = remaining.slice(idx + 2);
      var type = 'message', data = '';
      block.split('\n').forEach(function (line) {
        if (line.startsWith('event: ')) type = line.slice(7).trim();
        else if (line.startsWith('data: ')) data = line.slice(6);
      });
      events.push({ type: type, data: data });
    }
    return { events: events, remaining: remaining };
  }

  /* ── Build panel DOM ─────────────────────────────────────────── */
  var panel = document.createElement('div');
  panel.id = 'wb-ai-panel';
  panel.className = 'hidden';
  panel.innerHTML =
    '<div id="wb-ai-header">' +
      '<span id="wb-ai-title">AI Assistant</span>' +
      '<button id="wb-ai-close" title="Close">\u00d7</button>' +
    '</div>' +
    '<div id="wb-ai-messages"></div>' +
    '<div id="wb-ai-input-row">' +
      '<textarea id="wb-ai-input" rows="2" ' +
        'placeholder="Ask about this chunk\u2026" spellcheck="false"></textarea>' +
      '<button id="wb-ai-send">Send</button>' +
    '</div>';
  document.body.appendChild(panel);

  /* Toggle button for opening without a chunk ─────────────────── */
  var toggleBtn = document.createElement('button');
  toggleBtn.id = 'wb-ai-toggle';
  toggleBtn.textContent = '\u2736 AI';
  toggleBtn.title = 'Open AI assistant';
  document.body.appendChild(toggleBtn);

  var titleEl   = document.getElementById('wb-ai-title');
  var messagesEl= document.getElementById('wb-ai-messages');
  var inputEl   = document.getElementById('wb-ai-input');
  var sendBtn   = document.getElementById('wb-ai-send');

  var currentFile = '', currentName = '', currentNth = 0;

  function appendMsg(role, text) {
    var el = document.createElement('div');
    el.className = 'wb-ai-msg ' + role;
    el.textContent = text;
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return el;
  }

  function openAiPanel(file, name, nth) {
    currentFile = file || ''; currentName = name || ''; currentNth = nth || 0;
    titleEl.textContent = name ? (name + '  \u2014  ' + file) : 'AI Assistant';
    panel.classList.remove('hidden');
    inputEl.focus();
    if (name) {
      appendMsg('system', 'Context: chunk \u201c' + name + '\u201d from ' + file);
    }
  }

  function closeAiPanel() {
    panel.classList.add('hidden');
  }

  document.getElementById('wb-ai-close').addEventListener('click', closeAiPanel);
  toggleBtn.addEventListener('click', function () {
    if (panel.classList.contains('hidden')) {
      openAiPanel('', '', 0);
    } else {
      closeAiPanel();
    }
  });

  /* ── Send a question ─────────────────────────────────────────── */
  function sendQuestion() {
    var question = inputEl.value.trim();
    if (!question) return;
    inputEl.value = '';
    sendBtn.disabled = true;

    appendMsg('user', question);
    var assistantEl = appendMsg('assistant', '\u2026');
    var fullText = '';

    var body = { question: question };
    if (currentFile) { body.file = currentFile; body.name = currentName; body.nth = currentNth; }

    fetch('/__ai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    }).then(function (resp) {
      var ct = resp.headers.get('content-type') || '';
      if (ct.includes('application/json')) {
        return resp.json().then(function (data) {
          assistantEl.textContent = data.error || 'Error';
          assistantEl.classList.add('system');
          sendBtn.disabled = false;
        });
      }
      /* SSE stream */
      var reader = resp.body.getReader();
      var decoder = new TextDecoder();
      var buf = '';

      function pump() {
        return reader.read().then(function (chunk) {
          if (chunk.done) { sendBtn.disabled = false; return; }
          buf += decoder.decode(chunk.value, { stream: true });
          var parsed = parseSseBuf(buf);
          buf = parsed.remaining;
          var finished = false;
          parsed.events.forEach(function (ev) {
            if (ev.type === 'token') {
              try { fullText += JSON.parse(ev.data).t || ''; } catch (_) {}
              assistantEl.textContent = fullText;
              messagesEl.scrollTop = messagesEl.scrollHeight;
            } else if (ev.type === 'error') {
              try { assistantEl.textContent = JSON.parse(ev.data).error || 'Error'; }
              catch (_) { assistantEl.textContent = 'Error'; }
              assistantEl.classList.add('system');
              finished = true;
            } else if (ev.type === 'done') {
              if (!fullText) assistantEl.textContent = '(no response)';
              finished = true;
            }
          });
          if (finished) { sendBtn.disabled = false; return; }
          return pump();
        });
      }
      return pump();
    }).catch(function (e) {
      assistantEl.textContent = String(e);
      assistantEl.classList.add('system');
      sendBtn.disabled = false;
    });
  }

  sendBtn.addEventListener('click', sendQuestion);
  inputEl.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuestion();
    }
    if (e.key === 'Escape') { closeAiPanel(); }
  });

  /* Expose openAiPanel for the chunk button handler above ───────── */
  window.openAiPanel = openAiPanel;
})();
</script>
